name: Run Weather Metrics Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs automatically every 15 minutes
  workflow_dispatch:      # Allows manually clicking a button to run it instantly

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Execute Weather Script
      env:
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      run: |
        # This command finds the file anywhere in the repository and runs it
        python $(find . -name "weather.py" | head -n 1)
